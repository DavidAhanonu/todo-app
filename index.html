<!DOCTYPE html>
<html>
<head>
  <title>To-Do App</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 50px;
    }

    input {
      padding: 10px;
      width: 200px;
    }

    button {
      padding: 10px;
      margin-left: 5px;
      cursor: pointer;
    }

    li {
      margin-top: 10px;
      list-style: none;
    }
  </style>
</head>

<body>

  <h1>📝 To-Do List</h1>

  <input id="taskInput" placeholder="Enter a task">
  <button onclick="addTask()">Add</button>

  <ul id="list"></ul>

  <script>
    function addTask() {
      let input = document.getElementById("taskInput");
      let li = document.createElement("li");
      li.textContent = input.value;

      document.getElementById("list").appendChild(li);
      input.value = "";
    }
  </script>

</body>
</html>
